<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>放置ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="save-indicator">SAVED</div>
  <div id="game">
    <div id="stage-bg"></div>

    <!-- ヘッダー -->
    <div id="header">
      <div id="book-btns">
        <button class="book-btn" onclick="openBook('item')">図鑑</button>
      </div>
      <div id="stage-display">
        <div id="map-name-row">
          <img id="map-icon" src="" alt="" style="display:none">
          <span id="map-name">草原</span>
        </div>
        <div id="stage-grid"><!-- JS で生成 --></div>
      </div>
      <button id="mute-btn" onclick="toggleMute()"></button>
    </div>

    <!-- メインエリア -->
    <div id="main-grid">

      <!-- 左カラム：敵 + バトルログ + システムログ -->
      <div id="left-col">
        <div id="enemy-area">
          <img id="enemy-img" src="img/enemy/enemy_slime.png" alt="敵">
          <div id="multi-enemy-grid"></div>
          <div id="enemy-name">スライム</div>
          <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
          <div id="hp-display">
            HP: <span id="enemy-hp">10</span> / <span id="enemy-max-hp">10</span>
          </div>
          <div id="enemy-atk-display">ATK 2  0.5/s</div>
        </div>
        <div class="log-section" id="battle-log-section">
          <div class="log-label">バトルログ</div>
          <div id="log-battle"></div>
        </div>
        <div class="log-section" id="system-log-section">
          <div class="log-label">システム</div>
          <div id="log-system"></div>
        </div>
      </div>

      <!-- 右カラム：ステータス + インベントリ + システム + ボタン -->
      <div id="right-col">
        <div class="panel open" id="player-panel">
          <div class="panel-label" onclick="togglePanel('player-panel')">
            <span class="panel-icon" id="pi-player"></span>
            <span class="panel-title">ステータス</span>
            <span class="panel-arrow">▼</span>
          </div>
          <div class="panel-body" id="player-stats">
            <div class="stat-row">
              <div class="stat-box"><span class="stat-label">ATK</span><span id="stat-atk">1</span></div>
              <div class="stat-box"><span class="stat-label">STR</span><span id="stat-str">0</span></div>
              <div class="stat-box"><span class="stat-label">VIT</span><span id="stat-vit">0</span></div>
              <div class="stat-box"><span class="stat-label">INT</span><span id="stat-int">0</span></div>
              <div class="stat-box"><span class="stat-label">DEX</span><span id="stat-dex">0</span></div>
              <div class="stat-box"><span class="stat-label">AGI</span><span id="stat-agi">0</span></div>
              <div class="stat-box"><span class="stat-label">LUK</span><span id="stat-luk">0</span></div>
            </div>
            <div id="player-hp-row">
              <span class="phplabel">HP</span>
              <div id="player-hp-bar-wrap"><div id="player-hp-bar"></div></div>
              <span id="player-hp-display">50 / 50</span>
            </div>
            <div id="combat-info">
              <span>命中 <span id="info-hit">90</span>%</span>
              <span>速度 <span id="info-spd">1.0</span>/s</span>
              <span>クリ <span id="info-crit">0</span>%</span>
            </div>
          </div>
        </div>
        <div class="panel open" id="inventory-panel">
          <div class="panel-label" onclick="togglePanel('inventory-panel')">
            <span class="panel-icon" id="pi-inventory"></span>
            <span class="panel-title">所持アイテム</span>
            <span class="panel-arrow">▼</span>
          </div>
          <div class="panel-body" id="inventory-list"><span class="empty-msg">まだアイテムがありません</span></div>
        </div>
        <div class="panel open" id="shop-panel">
          <div class="panel-label shop-label" onclick="togglePanel('shop-panel')">
            <span class="panel-icon" id="pi-shop"></span>
            <span class="panel-title">ショップ</span>
            <span id="gold-display">G <span id="gold">0</span></span>
            <span class="panel-arrow">▼</span>
          </div>
          <div class="panel-body" id="shop-content">
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">HP全回復</span>
                <span class="shop-desc">HPを最大まで回復する</span>
              </div>
              <button class="shop-btn" id="btn-heal" onclick="buyHeal()"><span id="shop-heal-cost">20</span> G</button>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">体力強化</span>
                <span class="shop-desc">VIT+2（最大HP+10）</span>
              </div>
              <div class="shop-btn-group">
                <button class="shop-btn" id="btn-buy-vit" onclick="buyShopStat('vit',1)">×1 <span id="shop-vit-cost">15</span>G</button>
                <button class="shop-btn" id="btn-buy-vit-10" onclick="buyShopStat('vit',10)">×10 <span id="shop-vit-cost-10">150</span>G</button>
              </div>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">速度強化</span>
                <span class="shop-desc">AGI+3（攻撃速度↑）</span>
              </div>
              <div class="shop-btn-group">
                <button class="shop-btn" id="btn-buy-agi" onclick="buyShopStat('agi',1)">×1 <span id="shop-agi-cost">20</span>G</button>
                <button class="shop-btn" id="btn-buy-agi-10" onclick="buyShopStat('agi',10)">×10 <span id="shop-agi-cost-10">200</span>G</button>
              </div>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">命中強化</span>
                <span class="shop-desc">DEX+3（命中率+0.9%）</span>
              </div>
              <div class="shop-btn-group">
                <button class="shop-btn" id="btn-buy-dex" onclick="buyShopStat('dex',1)">×1 <span id="shop-dex-cost">15</span>G</button>
                <button class="shop-btn" id="btn-buy-dex-10" onclick="buyShopStat('dex',10)">×10 <span id="shop-dex-cost-10">150</span>G</button>
              </div>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">幸運強化</span>
                <span class="shop-desc">LUK+3（クリティカル率↑）</span>
              </div>
              <div class="shop-btn-group">
                <button class="shop-btn" id="btn-buy-luk" onclick="buyShopStat('luk',1)">×1 <span id="shop-luk-cost">25</span>G</button>
                <button class="shop-btn" id="btn-buy-luk-10" onclick="buyShopStat('luk',10)">×10 <span id="shop-luk-cost-10">250</span>G</button>
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>
  <div id="save-buttons"><!-- JS で生成 --></div>
  <!-- セーブデータ エクスポート/インポートモーダル -->
  <div id="modal-savedata" class="modal-overlay" onclick="closeSaveDataModal()">
    <div class="modal-box savedata-modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span id="savedata-title">セーブデータ</span>
        <button class="modal-close" onclick="closeSaveDataModal()">✕</button>
      </div>
      <div class="modal-body savedata-body">
        <p id="savedata-hint" class="savedata-hint"></p>
        <textarea id="savedata-textarea" class="savedata-textarea" spellcheck="false"></textarea>
        <div class="savedata-actions">
          <button id="savedata-copy-btn" class="savedata-btn" onclick="copyExportData()">コピー</button>
          <button id="savedata-apply-btn" class="savedata-btn primary" onclick="applyImport()">インポート実行</button>
          <button class="savedata-btn" onclick="closeSaveDataModal()">閉じる</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 図鑑モーダル（統合） -->
  <div id="modal-book" class="modal-overlay" onclick="closeBook()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header book-modal-header">
        <div class="book-tab-row">
          <button class="book-tab active" id="tab-item" onclick="switchBookTab('item')">アイテム</button>
          <button class="book-tab" id="tab-monster" onclick="switchBookTab('monster')">モンスター</button>
        </div>
        <button class="modal-close" onclick="closeBook()">✕</button>
      </div>
      <div class="modal-body" id="book-content"></div>
    </div>
  </div>

  <script src="data/items.js"></script>
  <script src="data/maps.js"></script>
  <script src="data/shop.js"></script>
  <script src="game.js"></script>
</body>
</html>
