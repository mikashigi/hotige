<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>放置ゲーム</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="save-indicator">SAVED</div>
  <div id="game">

    <!-- ヘッダー -->
    <div id="header">
      <div id="book-btns">
        <button class="book-btn" onclick="openModal('item-book')">アイテム図鑑</button>
        <button class="book-btn" onclick="openModal('monster-book')">モンスター図鑑</button>
      </div>
      <div id="stage-display"><span id="map-name">草原</span><span id="stage-num">1 / 10</span></div>
      <button id="mute-btn" onclick="toggleMute()"></button>
    </div>

    <!-- メインエリア -->
    <div id="main-grid">

      <!-- 左カラム：敵 + バトルログ + システムログ -->
      <div id="left-col">
        <div id="enemy-area">
          <img id="enemy-img" src="enemy_slime.png" alt="敵">
          <div id="enemy-name">スライム</div>
          <div id="hp-bar-wrap"><div id="hp-bar"></div></div>
          <div id="hp-display">
            HP: <span id="enemy-hp">10</span> / <span id="enemy-max-hp">10</span>
          </div>
          <div id="enemy-atk-display">ATK 2  0.5/s</div>
        </div>
        <div class="log-section" id="battle-log-section">
          <div class="log-label">バトルログ</div>
          <div id="log-battle"></div>
        </div>
        <div class="log-section" id="system-log-section">
          <div class="log-label">システム</div>
          <div id="log-system"></div>
        </div>
      </div>

      <!-- 右カラム：ステータス + インベントリ + システム + ボタン -->
      <div id="right-col">
        <div class="panel" id="player-panel">
          <div class="panel-label">ステータス</div>
          <div id="player-stats">
            <div class="stat-row">
              <div class="stat-box"><span class="stat-label">ATK</span><span id="stat-atk">1</span></div>
              <div class="stat-box"><span class="stat-label">STR</span><span id="stat-str">0</span></div>
              <div class="stat-box"><span class="stat-label">VIT</span><span id="stat-vit">0</span></div>
              <div class="stat-box"><span class="stat-label">INT</span><span id="stat-int">0</span></div>
              <div class="stat-box"><span class="stat-label">DEX</span><span id="stat-dex">0</span></div>
              <div class="stat-box"><span class="stat-label">AGI</span><span id="stat-agi">0</span></div>
              <div class="stat-box"><span class="stat-label">LUK</span><span id="stat-luk">0</span></div>
            </div>
            <div id="player-hp-row">
              <span class="phplabel">HP</span>
              <div id="player-hp-bar-wrap"><div id="player-hp-bar"></div></div>
              <span id="player-hp-display">50 / 50</span>
            </div>
            <div id="combat-info">
              <span>命中 <span id="info-hit">90</span>%</span>
              <span>速度 <span id="info-spd">1.0</span>/s</span>
              <span>クリ <span id="info-crit">0</span>%</span>
            </div>
          </div>
        </div>
        <div class="panel" id="inventory-panel">
          <div class="panel-label">所持アイテム</div>
          <div id="inventory-list"><span class="empty-msg">まだアイテムがありません</span></div>
        </div>
        <div class="panel" id="shop-panel">
          <div class="panel-label shop-label">
            <span>ショップ</span>
            <span id="gold-display">G <span id="gold">0</span></span>
          </div>
          <div id="shop-content">
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">HP全回復</span>
                <span class="shop-desc">HPを最大まで回復する</span>
              </div>
              <button class="shop-btn" id="btn-heal" onclick="buyHeal()"><span id="shop-heal-cost">20</span> G</button>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">体力強化</span>
                <span class="shop-desc">VIT+2（最大HP+10）</span>
              </div>
              <button class="shop-btn" id="btn-buy-vit" onclick="buyShopStat('vit')"><span id="shop-vit-cost">15</span> G</button>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">速度強化</span>
                <span class="shop-desc">AGI+3（攻撃速度↑）</span>
              </div>
              <button class="shop-btn" id="btn-buy-agi" onclick="buyShopStat('agi')"><span id="shop-agi-cost">20</span> G</button>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">命中強化</span>
                <span class="shop-desc">DEX+3（命中率+0.9%）</span>
              </div>
              <button class="shop-btn" id="btn-buy-dex" onclick="buyShopStat('dex')"><span id="shop-dex-cost">15</span> G</button>
            </div>
            <div class="shop-row">
              <div class="shop-info">
                <span class="shop-name">幸運強化</span>
                <span class="shop-desc">LUK+3（クリティカル率↑）</span>
              </div>
              <button class="shop-btn" id="btn-buy-luk" onclick="buyShopStat('luk')"><span id="shop-luk-cost">25</span> G</button>
            </div>
          </div>
        </div>
        <div id="save-buttons">
          <button onclick="saveGame()">セーブ</button>
          <button onclick="resetSave()">リセット</button>
        </div>
      </div>

    </div>
  </div>
  <!-- アイテム図鑑モーダル -->
  <div id="modal-item-book" class="modal-overlay" onclick="closeModal('item-book')">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span>アイテム図鑑</span>
        <button class="modal-close" onclick="closeModal('item-book')">✕</button>
      </div>
      <div class="modal-body" id="item-book-content"></div>
    </div>
  </div>

  <!-- モンスター図鑑モーダル -->
  <div id="modal-monster-book" class="modal-overlay" onclick="closeModal('monster-book')">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-header">
        <span>モンスター図鑑</span>
        <button class="modal-close" onclick="closeModal('monster-book')">✕</button>
      </div>
      <div class="modal-body" id="monster-book-content"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
